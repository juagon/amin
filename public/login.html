<!DOCTYPE html>
<!--
  Intranet AMIN — Login
  Marca: Andina de Materiales Industriales S.A.S
  Paleta: #274016 (verde oscuro) · #EFFBEF (fondo menta) · Fuente: Poppins
  WordPress-ready: estructura semántica, Google Fonts, CSS variables
-->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Intranet AMIN — Acceso</title>

  <!-- Google Fonts — Poppins + Raleway (WordPress-compatible) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Raleway:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    /* ── CSS Custom Properties (WordPress theme-override ready) ── */
    :root {
      --amin-verde-oscuro:   #1B4D3E;
      --amin-verde-medio:    #2E7D5A;
      --amin-verde-claro:    #EBF5F0;
      --amin-verde-brillante:#5BA87A;
      --amin-negro-bar:      #0F0C0C;
      --amin-blanco:         #FFFFFF;
      --amin-texto:          #222222;
      --amin-gris-suave:     #F9F9F9;
      --amin-borde:          #C2DED3;
      --amin-sombra:         rgba(27, 77, 62, 0.18);
      --radius-pill:         100px;
      --radius-card:         20px;
      --font-main:           'Poppins', sans-serif;
      --font-heading:        'Raleway', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      min-height: 100vh;
      background: var(--amin-verde-oscuro);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background decorative circles */
    body::before,
    body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
      pointer-events: none;
    }
    body::before { width: 600px; height: 600px; top: -200px; right: -150px; }
    body::after  { width: 400px; height: 400px; bottom: -120px; left: -100px; }

    /* Accent stripe — right side, matches amin.com.co */
    .accent-stripe {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 7px;
      background: linear-gradient(180deg, var(--amin-verde-brillante) 0%, #A8E063 100%);
    }

    /* ── Login wrapper ── */
    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 24px 20px;
      position: relative;
      z-index: 1;
    }

    /* Logo area */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-img {
      height: 72px;
      width: auto;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.3));
    }
    .logo-fallback {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--amin-blanco);
      border-radius: 50px;
      padding: 10px 28px;
      height: 72px;
    }
    .logo-fallback span {
      font-family: var(--font-main);
      font-weight: 900;
      font-size: 2rem;
      color: var(--amin-verde-oscuro);
      letter-spacing: -0.02em;
    }
    .logo-area p {
      color: rgba(255,255,255,0.65);
      font-size: 0.76rem;
      font-weight: 500;
      margin-top: 10px;
      letter-spacing: 0.03em;
    }

    /* Card */
    .card {
      background: var(--amin-blanco);
      border-radius: var(--radius-card);
      padding: 36px 32px 32px;
      box-shadow: 0 24px 64px var(--amin-sombra), 0 4px 16px rgba(0,0,0,0.1);
    }
    .card-title {
      font-family: var(--font-heading);
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--amin-verde-oscuro);
      text-align: center;
      margin-bottom: 8px;
    }
    .card-sub {
      font-size: 0.76rem;
      color: #888;
      text-align: center;
      margin-bottom: 28px;
    }

    /* Form fields */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 7px;
    }
    .field input {
      width: 100%;
      border: 2px solid var(--amin-borde);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.92rem;
      font-family: var(--font-main);
      color: var(--amin-texto);
      background: var(--amin-verde-claro);
      transition: border-color 0.2s, background 0.2s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--amin-verde-medio);
      background: var(--amin-blanco);
    }
    .field input::placeholder { color: #aaa; }

    /* Error message */
    .error-msg {
      background: #FFF0F0;
      border: 1.5px solid #FFAAAA;
      border-radius: 10px;
      color: #C00;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
      text-align: center;
    }

    /* Submit button — pill style matching amin.com.co */
    .btn-login {
      width: 100%;
      padding: 14px 24px;
      background: var(--amin-verde-oscuro);
      color: var(--amin-blanco);
      border: none;
      border-radius: var(--radius-pill);
      font-family: var(--font-main);
      font-size: 0.96rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.03em;
      margin-top: 6px;
    }
    .btn-login:hover   { background: var(--amin-verde-medio); }
    .btn-login:active  { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Footer note */
    .footer-note {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.67rem;
      margin-top: 24px;
      line-height: 1.7;
    }

    @media (max-width: 460px) {
      .card { padding: 28px 22px 24px; }
    }
  </style>
</head>
<body>

  <div class="accent-stripe"></div>

  <div class="login-wrap">

    <!-- Logo -->
    <div class="logo-area">
      <img
        class="logo-img"
        src="https://amin.com.co/wp-content/uploads/2024/03/logo2.png"
        alt="AMIN"
        onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='inline-flex';"
      />
      <div class="logo-fallback" id="logoFallback" style="display:none;">
        <span>amin</span>
      </div>
      <p>Andina de Materiales Industriales S.A.S</p>
    </div>

    <!-- Card -->
    <div class="card">
      <h1 class="card-title">Acceso a Intranet</h1>
      <p class="card-sub">Ingresa tus credenciales para continuar</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm" novalidate>
        <div class="field">
          <label for="usuario">Usuario</label>
          <input
            type="text"
            id="usuario"
            name="usuario"
            placeholder="Tu usuario"
            autocomplete="username"
            required
          />
        </div>
        <div class="field">
          <label for="clave">Contraseña</label>
          <input
            type="password"
            id="clave"
            name="clave"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit" class="btn-login" id="btnLogin">
          Ingresar al catálogo →
        </button>
      </form>
    </div>

    <p class="footer-note">
      Uso interno exclusivo · v1.0 · 2026
    </p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('errorMsg');
      btn.textContent = 'Ingresando...';
      btn.disabled    = true;
      err.style.display = 'none';

      try {
        const res  = await fetch('/api/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            usuario: document.getElementById('usuario').value.trim(),
            clave:   document.getElementById('clave').value
          })
        });
        const data = await res.json();
        if (data.ok) {
          btn.textContent = '✓ Bienvenido';
          window.location.href = data.rol === 'cliente' ? '/mi-cuenta.html' : '/catalogo.html';
        } else {
          err.textContent   = data.mensaje || 'Usuario o contraseña incorrectos';
          err.style.display = 'block';
          btn.textContent   = 'Ingresar al catálogo →';
          btn.disabled      = false;
          document.getElementById('clave').value = '';
          document.getElementById('clave').focus();
        }
      } catch {
        err.textContent   = 'Error de conexión con el servidor';
        err.style.display = 'block';
        btn.textContent   = 'Ingresar al catálogo →';
        btn.disabled      = false;
      }
    });
  </script>
</body>
</html>
